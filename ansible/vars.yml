---
# Non-secret configuration for Qwen Cloud Run deployment.
# Secrets (project_id, qwen_hf_token) live in ~/Secrets/ziggy-ansible-secrets.yml
# and are passed via: --extra-vars @~/Secrets/ziggy-ansible-secrets.yml

region: "us-central1"
service_name: "qwen-personal-assistant"
custom_domain: "qwen.broze.net"
hf_token_secret_name: "hf-token"

# GPU
gpu_type: "nvidia-l4"
gpu_count: 1
cpu: 8
memory: "32Gi"

# Model — GGUF from HuggingFace
# Find files at: https://huggingface.co/<model_repo>/tree/main
model_repo: "bartowski/Qwen_Qwen3-30B-A3B-GGUF"
model_file: "Qwen_Qwen3-30B-A3B-Q4_K_M.gguf"

# llama-server flags (API key is injected separately from HF_TOKEN)
llama_args: "--n-gpu-layers 99 --ctx-size 16384"

# Scaling
min_instances: 0
max_instances: 1
concurrency: 4

# Schedule (Cloud Scheduler)
wake_cron: "0 7 * * *"
sleep_cron: "0 21 * * *"
schedule_timezone: "America/Chicago"

---
- name: Deploy Ollama on Cloud Run
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    region: us-east4
    service: qwen-llm
    image: "{{ region }}-docker.pkg.dev/{{ project_id }}/cloud-run-source-deploy/{{ service }}"
    sa: "qwen-runner@{{ project_id }}.iam.gserviceaccount.com"
  tasks:

    - name: Verify project_id is set
      assert:
        that: project_id is defined and project_id | length > 0
        fail_msg: "Pass -e project_id=your-project-id"

    - name: Verify domain is set
      assert:
        that: domain is defined and domain | length > 0
        fail_msg: "Pass -e domain=your.domain.here"

    - name: Enable APIs
      command: >
        gcloud services enable
        run.googleapis.com cloudbuild.googleapis.com
        secretmanager.googleapis.com
        --project={{ project_id }} --quiet
      changed_when: false

    - name: Check service account
      command: >
        gcloud iam service-accounts describe {{ sa }} --project={{ project_id }}
      register: sa_check
      failed_when: false
      changed_when: false

    - name: Create service account
      command: >
        gcloud iam service-accounts create qwen-runner
        --display-name="Qwen Cloud Run" --project={{ project_id }}
      when: sa_check.rc != 0

    - name: Check API key secret
      command: >
        gcloud secrets describe qwen-api-key --project={{ project_id }}
      register: secret_check
      failed_when: false
      changed_when: false

    - name: Generate and store API key
      shell: >
        python3 -c "import secrets; print(secrets.token_urlsafe(48), end='')"
        | gcloud secrets create qwen-api-key --data-file=- --project={{ project_id }}
      when: secret_check.rc != 0

    - name: Grant SA access to API key
      command: >
        gcloud secrets add-iam-policy-binding qwen-api-key
        --member=serviceAccount:{{ sa }}
        --role=roles/secretmanager.secretAccessor
        --project={{ project_id }} --quiet
      changed_when: false

    - name: Build container
      command:
        cmd: >
          gcloud builds submit app/
          --tag={{ image }}:latest
          --region={{ region }}
          --timeout=1800
          --project={{ project_id }} --quiet
        chdir: "{{ playbook_dir }}/.."

    - name: Deploy Cloud Run
      command: >
        gcloud run deploy {{ service }}
        --image={{ image }}:latest --region={{ region }}
        --command="" --args=""
        --gpu=1 --gpu-type=nvidia-l4
        --cpu=8 --memory=32Gi
        --no-cpu-throttling --cpu-boost
        --concurrency=4 --timeout=1200
        --min-instances=0 --max-instances=1
        --set-env-vars=OLLAMA_NUM_PARALLEL=4
        --set-secrets=API_KEY=qwen-api-key:latest
        --no-gpu-zonal-redundancy --allow-unauthenticated
        --service-account={{ sa }}
        --project={{ project_id }} --quiet

    - name: Grant IAM roles
      command: "{{ item }}"
      loop:
        - >-
          gcloud projects add-iam-policy-binding {{ project_id }}
          --member=serviceAccount:{{ sa }}
          --role=roles/run.developer --quiet
        - >-
          gcloud run services add-iam-policy-binding {{ service }}
          --region={{ region }} --member=serviceAccount:{{ sa }}
          --role=roles/run.invoker --project={{ project_id }} --quiet
      changed_when: false

    - name: Check domain mapping
      command: >
        gcloud beta run domain-mappings describe
        --domain={{ domain }} --region={{ region }} --project={{ project_id }}
      register: domain
      failed_when: false
      changed_when: false

    - name: Create domain mapping
      command: >
        gcloud beta run domain-mappings create
        --service={{ service }} --domain={{ domain }}
        --region={{ region }} --project={{ project_id }}
      when: domain.rc != 0

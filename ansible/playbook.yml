---
- name: Deploy Ollama on Cloud Run
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    region: us-east4
    service: qwen-llm
    model: "{{ ollama_model | default('qwen3:30b-a3b') }}"
    sa: "qwen-runner@{{ project_id }}.iam.gserviceaccount.com"
    image: "{{ region }}-docker.pkg.dev/{{ project_id }}/qwen-repo/{{ service }}"
  tasks:

    - name: Verify project_id is set
      assert:
        that: project_id is defined and project_id | length > 0
        fail_msg: "Pass -e project_id=your-project-id"

    - name: Enable APIs
      command: >
        gcloud services enable
        run.googleapis.com cloudbuild.googleapis.com
        artifactregistry.googleapis.com cloudscheduler.googleapis.com
        secretmanager.googleapis.com
        --project={{ project_id }} --quiet
      changed_when: false

    - name: Check Artifact Registry
      command: >
        gcloud artifacts repositories describe qwen-repo
        --location={{ region }} --project={{ project_id }}
      register: ar
      failed_when: false
      changed_when: false

    - name: Create Artifact Registry
      command: >
        gcloud artifacts repositories create qwen-repo
        --repository-format=docker --location={{ region }} --project={{ project_id }}
      when: ar.rc != 0

    - name: Check service account
      command: >
        gcloud iam service-accounts describe {{ sa }} --project={{ project_id }}
      register: sa_check
      failed_when: false
      changed_when: false

    - name: Create service account
      command: >
        gcloud iam service-accounts create qwen-runner
        --display-name="Qwen Cloud Run" --project={{ project_id }}
      when: sa_check.rc != 0

    - name: Check API key secret
      command: >
        gcloud secrets describe qwen-api-key --project={{ project_id }}
      register: secret_check
      failed_when: false
      changed_when: false

    - name: Generate and store API key
      shell: >
        python3 -c "import secrets; print(secrets.token_urlsafe(48), end='')"
        | gcloud secrets create qwen-api-key --data-file=- --project={{ project_id }}
      when: secret_check.rc != 0

    - name: Grant SA access to API key
      command: >
        gcloud secrets add-iam-policy-binding qwen-api-key
        --member=serviceAccount:{{ sa }}
        --role=roles/secretmanager.secretAccessor
        --project={{ project_id }} --quiet
      changed_when: false

    - name: Build container
      command:
        cmd: >
          gcloud builds submit app/
          --tag={{ image }}:latest --project={{ project_id }} --timeout=1200
        chdir: "{{ playbook_dir }}/.."

    - name: Deploy Cloud Run
      command: >
        gcloud beta run deploy {{ service }}
        --image={{ image }}:latest --region={{ region }}
        --gpu=1 --gpu-type=nvidia-l4
        --cpu=8 --memory=32Gi
        --no-cpu-throttling --cpu-boost
        --concurrency=4 --timeout=1200
        --min-instances=0 --max-instances=1
        --set-env-vars=OLLAMA_MODEL={{ model }}
        --set-secrets=API_KEY=qwen-api-key:latest
        --no-gpu-zonal-redundancy --allow-unauthenticated
        --service-account={{ sa }}
        --project={{ project_id }} --quiet

    - name: Get project number
      command: >
        gcloud projects describe {{ project_id }} --format=value(projectNumber)
      register: pn
      changed_when: false

    - name: Grant IAM roles
      command: "{{ item }}"
      loop:
        - >-
          gcloud projects add-iam-policy-binding {{ project_id }}
          --member=serviceAccount:{{ sa }}
          --role=roles/run.developer --quiet
        - >-
          gcloud run services add-iam-policy-binding {{ service }}
          --region={{ region }} --member=serviceAccount:{{ sa }}
          --role=roles/run.invoker --project={{ project_id }} --quiet
        - >-
          gcloud iam service-accounts add-iam-policy-binding {{ sa }}
          --member=serviceAccount:service-{{ pn.stdout }}@gcp-sa-cloudscheduler.iam.gserviceaccount.com
          --role=roles/iam.serviceAccountUser --project={{ project_id }} --quiet
      changed_when: false

    - name: Check scheduler jobs
      command: >
        gcloud scheduler jobs describe {{ service }}-{{ item.name }}
        --location={{ region }} --project={{ project_id }}
      loop:
        - { name: wake,  min: 1, cron: "0 7 * * *" }
        - { name: sleep, min: 0, cron: "0 21 * * *" }
      register: jobs
      failed_when: false
      changed_when: false

    - name: Configure scheduler jobs
      command: >
        gcloud scheduler jobs {{ 'update' if item.rc == 0 else 'create' }} http {{ service }}-{{ item.item.name }}
        --location={{ region }}
        --schedule="{{ item.item.cron }}"
        --time-zone=America/Chicago
        --uri=https://run.googleapis.com/v2/projects/{{ project_id }}/locations/{{ region }}/services/{{ service }}?updateMask=template.scaling.minInstanceCount
        --http-method=PATCH
        {{ '--update-headers' if item.rc == 0 else '--headers' }}=Content-Type=application/json
        --message-body='{"template":{"scaling":{"minInstanceCount":{{ item.item.min }}}}}'
        --oauth-service-account-email={{ sa }}
        --project={{ project_id }} --quiet
      loop: "{{ jobs.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Check domain mapping
      command: >
        gcloud beta run domain-mappings describe
        --domain=qwen.broze.net --region={{ region }} --project={{ project_id }}
      register: domain
      failed_when: false
      changed_when: false

    - name: Create domain mapping
      command: >
        gcloud beta run domain-mappings create
        --service={{ service }} --domain=qwen.broze.net
        --region={{ region }} --project={{ project_id }}
      when: domain.rc != 0

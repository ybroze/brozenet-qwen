---
- name: Deploy Qwen LLM (llama.cpp + L4)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:

    - name: Verify project_id is set (must come from secrets file)
      ansible.builtin.assert:
        that: project_id is defined and project_id | length > 0
        fail_msg: "project_id not set. Pass --extra-vars @/path/to/secrets.yml (see secrets.example.yml)"

    - name: Resolve project number
      ansible.builtin.command: gcloud projects describe {{ project_id }} --format=value(projectNumber)
      register: project_number_result
      changed_when: false

    - name: Set project facts
      ansible.builtin.set_fact:
        project_number: "{{ project_number_result.stdout }}"
        compute_sa: "qwen-runner@{{ project_id }}.iam.gserviceaccount.com"
        scheduler_sa: "service-{{ project_number_result.stdout }}@gcp-sa-cloudscheduler.iam.gserviceaccount.com"

    - name: Enable required GCP APIs
      ansible.builtin.command: >
        gcloud services enable
        run.googleapis.com
        artifactregistry.googleapis.com
        secretmanager.googleapis.com
        cloudscheduler.googleapis.com
        cloudquotas.googleapis.com
        --project={{ project_id }}

    # --- Service account (idempotent) ---

    - name: Check if Cloud Run service account exists
      ansible.builtin.command: >
        gcloud iam service-accounts describe {{ compute_sa }}
        --project={{ project_id }}
        --format=value(email)
      register: sa_exists
      failed_when: false
      changed_when: false

    - name: Create Cloud Run service account
      ansible.builtin.command: >
        gcloud iam service-accounts create qwen-runner
        --display-name="Qwen Cloud Run SA"
        --project={{ project_id }}
      when: sa_exists.rc != 0

    # --- HF token secret (idempotent) ---

    - name: Check if HF token secret exists
      ansible.builtin.command: >
        gcloud secrets describe {{ hf_token_secret_name }}
        --project={{ project_id }}
        --format=value(name)
      register: hf_secret_exists
      failed_when: false
      changed_when: false

    - name: Create HF token secret
      ansible.builtin.command: >
        gcloud secrets create {{ hf_token_secret_name }}
        --replication-policy=automatic
        --project={{ project_id }}
      when: hf_secret_exists.rc != 0

    - name: Add HF token version
      ansible.builtin.shell: |
        echo -n "{{ qwen_hf_token }}" | gcloud secrets versions add {{ hf_token_secret_name }} --data-file=- --project={{ project_id }} 2>&1 || true
      no_log: true
      register: hf_token_result

    - name: Verify HF token secret has at least one version
      ansible.builtin.command: >
        gcloud secrets versions list {{ hf_token_secret_name }}
        --project={{ project_id }}
        --limit=1
        --format=value(name)
      register: hf_secret_check
      failed_when: hf_secret_check.stdout == ""
      changed_when: false

    - name: Grant Cloud Run SA secret access
      ansible.builtin.command: >
        gcloud secrets add-iam-policy-binding {{ hf_token_secret_name }}
        --member="serviceAccount:{{ compute_sa }}"
        --role=roles/secretmanager.secretAccessor
        --project={{ project_id }}
      changed_when: false

    # --- Artifact Registry remote repo (pull-through cache for ghcr.io) ---

    - name: Check if ghcr-mirror repo exists
      ansible.builtin.command: >
        gcloud artifacts repositories describe ghcr-mirror
        --location={{ region }}
        --project={{ project_id }}
        --format=value(name)
      register: ghcr_mirror_exists
      failed_when: false
      changed_when: false

    - name: Create ghcr-mirror remote repo
      ansible.builtin.command: >
        gcloud artifacts repositories create ghcr-mirror
        --repository-format=docker
        --location={{ region }}
        --project={{ project_id }}
        --mode=remote-repository
        --remote-docker-repo=https://ghcr.io
      when: ghcr_mirror_exists.rc != 0

    # --- GPU quota (idempotent) ---

    - name: Install gcloud beta component
      ansible.builtin.command: gcloud components install beta --quiet

    - name: Check if GPU quota preference exists
      ansible.builtin.command: >
        gcloud beta quotas preferences describe l4-gpu-no-redundancy-{{ region }}
        --project={{ project_id }}
        --format=json
      register: gpu_pref_exists
      failed_when: false
      changed_when: false

    - name: Request GPU quota (if no preference exists)
      ansible.builtin.command: >
        gcloud beta quotas preferences create
        --service=run.googleapis.com
        --project={{ project_id }}
        --quota-id={{ gpu_quota_id }}
        --preferred-value={{ gpu_count }}
        --dimensions=region={{ region }}
        --preference-id=l4-gpu-no-redundancy-{{ region }}
        --justification="Cloud Run GPU deployment for {{ service_name }}"
      when: gpu_pref_exists.rc != 0

    - name: Wait for GPU quota to be granted (polls every 60s, up to 30 min)
      ansible.builtin.command: >
        gcloud beta quotas preferences describe l4-gpu-no-redundancy-{{ region }}
        --project={{ project_id }}
        --format=value(quotaConfig.grantedValue)
      register: gpu_quota_granted
      until: gpu_quota_granted.stdout | int >= gpu_count
      retries: 30
      delay: 60
      changed_when: false

    # --- Deploy Cloud Run ---

    - name: Deploy Cloud Run service (stock llama.cpp + L4)
      ansible.builtin.command:
        argv:
          - gcloud
          - beta
          - run
          - deploy
          - "{{ service_name }}"
          - "--image={{ llama_image }}"
          - "--region={{ region }}"
          - "--gpu={{ gpu_count }}"
          - "--gpu-type={{ gpu_type }}"
          - "--cpu={{ cpu }}"
          - "--memory={{ memory }}"
          - "--no-cpu-throttling"
          - "--concurrency={{ concurrency }}"
          - "--timeout=1200"
          - "--cpu-boost"
          - "--min-instances={{ min_instances }}"
          - "--max-instances={{ max_instances }}"
          - "--set-env-vars=^::^MODEL_REPO={{ model_repo }}::MODEL_FILE={{ model_file }}::LLAMA_ARGS={{ llama_args }}"
          - "--set-secrets=HF_TOKEN={{ hf_token_secret_name }}:latest"
          - "--no-gpu-zonal-redundancy"
          - "--no-allow-unauthenticated"
          - "--service-account={{ compute_sa }}"
          - "--command=sh"
          - "--args=-c,mkdir -p /tmp/models && curl -L --fail --http1.1 -H \"Authorization: Bearer $HF_TOKEN\" -o /tmp/models/model.gguf https://huggingface.co/$MODEL_REPO/resolve/main/$MODEL_FILE && exec llama-server --host 0.0.0.0 --port 8080 --model /tmp/models/model.gguf $LLAMA_ARGS --api-key $HF_TOKEN"
          - "--project={{ project_id }}"
          - "--quiet"

    # --- IAM bindings (idempotent — gcloud no-ops if binding exists) ---

    - name: Grant compute SA permission to update Cloud Run service
      ansible.builtin.command: >
        gcloud run services add-iam-policy-binding {{ service_name }}
        --region={{ region }}
        --member="serviceAccount:{{ compute_sa }}"
        --role=roles/run.developer
        --project={{ project_id }}
      changed_when: false

    - name: Grant Cloud Scheduler permission to act as compute SA
      ansible.builtin.command: >
        gcloud iam service-accounts add-iam-policy-binding {{ compute_sa }}
        --member="serviceAccount:{{ scheduler_sa }}"
        --role=roles/iam.serviceAccountUser
        --project={{ project_id }}
      changed_when: false

    # --- Cloud Scheduler (idempotent via update-or-create) ---

    - name: Check if wake schedule exists
      ansible.builtin.command: >
        gcloud scheduler jobs describe {{ service_name }}-wake
        --location={{ region }}
        --project={{ project_id }}
        --format=value(name)
      register: wake_job_exists
      failed_when: false
      changed_when: false

    - name: "{{ 'Update' if wake_job_exists.rc == 0 else 'Create' }} wake schedule ({{ wake_cron }} {{ schedule_timezone }})"
      ansible.builtin.shell: >
        gcloud scheduler jobs {{ 'update' if wake_job_exists.rc == 0 else 'create' }} http {{ service_name }}-wake
        --location={{ region }}
        --schedule="{{ wake_cron }}"
        --time-zone="{{ schedule_timezone }}"
        --uri="https://run.googleapis.com/v2/projects/{{ project_id }}/locations/{{ region }}/services/{{ service_name }}:patch?updateMask=template.scaling.minInstanceCount"
        --http-method=POST
        {{ '--update-headers' if wake_job_exists.rc == 0 else '--headers' }}="Content-Type=application/json"
        --message-body='{"template":{"scaling":{"minInstanceCount":1}}}'
        --oauth-service-account-email="{{ compute_sa }}"
        --project={{ project_id }}

    - name: Check if sleep schedule exists
      ansible.builtin.command: >
        gcloud scheduler jobs describe {{ service_name }}-sleep
        --location={{ region }}
        --project={{ project_id }}
        --format=value(name)
      register: sleep_job_exists
      failed_when: false
      changed_when: false

    - name: "{{ 'Update' if sleep_job_exists.rc == 0 else 'Create' }} sleep schedule ({{ sleep_cron }} {{ schedule_timezone }})"
      ansible.builtin.shell: >
        gcloud scheduler jobs {{ 'update' if sleep_job_exists.rc == 0 else 'create' }} http {{ service_name }}-sleep
        --location={{ region }}
        --schedule="{{ sleep_cron }}"
        --time-zone="{{ schedule_timezone }}"
        --uri="https://run.googleapis.com/v2/projects/{{ project_id }}/locations/{{ region }}/services/{{ service_name }}:patch?updateMask=template.scaling.minInstanceCount"
        --http-method=POST
        {{ '--update-headers' if sleep_job_exists.rc == 0 else '--headers' }}="Content-Type=application/json"
        --message-body='{"template":{"scaling":{"minInstanceCount":0}}}'
        --oauth-service-account-email="{{ compute_sa }}"
        --project={{ project_id }}

    # --- Custom domain (idempotent) ---

    - name: Check if domain mapping exists
      ansible.builtin.command: >
        gcloud beta run domain-mappings describe
        --domain={{ custom_domain }}
        --region={{ region }}
        --project={{ project_id }}
        --format=value(metadata.name)
      register: domain_mapping_exists
      failed_when: false
      changed_when: false

    - name: Map custom domain {{ custom_domain }}
      ansible.builtin.command: >
        gcloud beta run domain-mappings create
        --service={{ service_name }}
        --domain={{ custom_domain }}
        --region={{ region }}
        --project={{ project_id }}
      when: domain_mapping_exists.rc != 0

    - name: Final status
      ansible.builtin.debug:
        msg: |
          Deployed!
          Next steps:
          1. Run `gcloud beta run domain-mappings describe --domain={{ custom_domain }} --region={{ region }}` for DNS records.
          2. GPU auto-wakes at {{ wake_cron }} and sleeps at {{ sleep_cron }} ({{ schedule_timezone }}).
          3. Manual override: ./wake.sh or ./sleep.sh
          4. Verify hardening: ./harden.sh
          5. Test: curl -H "Authorization: Bearer $(gcloud auth print-identity-token)" https://{{ custom_domain }}/v1/models
